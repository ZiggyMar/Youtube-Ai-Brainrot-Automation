<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Layout Editor - Pro</title>
    <style>
        @font-face {
            font-family: 'Burbank';
            src: url('../assets/Font/Burbank.ttf');
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            height: 100vh;
            overflow: hidden;
        }

        #header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 1200px;
            align-items: center;
            margin-bottom: 10px;
        }

        #controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            background-color: #007acc;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
            font-weight: bold;
        }

        button:hover {
            background-color: #005f9e;
        }

        button.secondary {
            background-color: #444;
        }

        #editor-container {
            display: flex;
            gap: 20px;
            height: calc(100vh - 100px);
            align-items: flex-start;
        }

        #canvas-wrapper {
            position: relative;
            width: 432px;
            /* 1080 * 0.4 */
            height: 768px;
            /* 1920 * 0.4 */
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            border: 4px solid #333;
            background-color: #000;
            flex-shrink: 0;
            overflow: hidden;
        }

        #canvas-container {
            position: relative;
            width: 1080px;
            height: 1920px;
            transform-origin: top left;
            transform: scale(0.4);
        }

        #background-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 1080px;
            height: 1920px;
            object-fit: cover;
            opacity: 0.6;
            pointer-events: none;
        }

        .element {
            position: absolute;
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            box-sizing: border-box;
            transition: outline 0.1s;
        }

        .element:hover {
            outline: 2px dashed rgba(255, 255, 255, 0.5);
        }

        .element.selected {
            outline: 3px solid #007acc;
            z-index: 1000;
        }

        .element img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        /* Subtitles Style */
        #subtitles {
            font-family: 'Burbank', 'Impact', sans-serif;
            color: yellow;
            font-size: 110px;
            text-transform: uppercase;
            text-align: center;
            -webkit-text-stroke: 6px black;
            paint-order: stroke fill;
            filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.5));
        }

        /* Difficulty List Style */
        #difficulty_list {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 10px;
            padding: 10px;
        }

        .diff-item {
            font-family: 'Burbank', 'Impact', sans-serif;
            font-size: 50px;
            text-transform: uppercase;
            -webkit-text-stroke: 2px black;
            paint-order: stroke fill;
        }

        /* Resize Handle */
        .resize-handle {
            width: 30px;
            height: 30px;
            background-color: #007acc;
            position: absolute;
            right: -15px;
            bottom: -15px;
            cursor: se-resize;
            display: none;
            border-radius: 50%;
            border: 3px solid white;
            z-index: 1001;
        }

        .element.selected .resize-handle {
            display: block;
        }

        #properties {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            width: 280px;
            border: 1px solid #333;
        }

        .prop-group {
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .prop-group h4 {
            margin: 0 0 10px 0;
            color: #007acc;
            text-transform: uppercase;
            font-size: 12px;
        }

        .prop-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .prop-row label {
            font-size: 13px;
            color: #aaa;
        }

        input[type="number"] {
            width: 70px;
            background: #000;
            border: 1px solid #444;
            color: white;
            padding: 5px;
            border-radius: 4px;
        }

        #prop-font-size-row {
            display: none;
        }

        .hint {
            font-size: 11px;
            color: #666;
            margin-top: 10px;
            font-style: italic;
        }

        #timer img,
        #cta img {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>

<body>

    <div id="header">
        <h1>🧠 Brainrot Layout Editor Pro</h1>
        <div id="controls">
            <button class="secondary" onclick="resetLayout()">↺ Reset</button>
            <button onclick="downloadConfig()">💾 Export layout_config.json</button>
        </div>
    </div>

    <div id="editor-container">
        <div id="canvas-wrapper">
            <div id="canvas-container">
                <!-- Background Preview -->
                <img id="background-img" src="../assets/Layout/Background.png" alt="">

                <!-- Elements -->
                <div id="character" class="element" style="left: 0px; top: 1120px; width: 1080px; height: 850px;">
                    <img src="../assets/Layout/Happy.png" alt="Character">
                    <div class="resize-handle"></div>
                </div>

                <div id="subtitles" class="element" style="left: 90px; top: 1050px; width: 900px; height: 150px;">
                    WEARING CLOTHES
                    <div class="resize-handle"></div>
                </div>

                <div id="timer" class="element" style="left: 0px; top: 0px; width: 1080px; height: 1920px;">
                    <img src="../assets/Layout/Timer.png" alt="Timer">
                    <div class="resize-handle"></div>
                </div>

                <div id="cta" class="element" style="left: 0px; top: 0px; width: 1080px; height: 1920px;">
                    <img src="../assets/Layout/CTA.png" alt="CTA">
                    <div class="resize-handle"></div>
                </div>

                <div id="difficulty_list" class="element" style="left: 50px; top: 100px; width: 400px; height: 400px;"
                    data-font-size="50">
                    <div class="diff-item" style="color: #2ecc71;">1. EASY</div>
                    <div class="diff-item" style="color: white;">2. MEDIUM</div>
                    <div class="diff-item" style="color: white;">3. HARD</div>
                    <div class="diff-item" style="color: white;">4. IMPOSSIBLE</div>
                    <div class="resize-handle"></div>
                </div>
            </div>
        </div>

        <div id="properties">
            <div class="prop-group">
                <h4>Selected Element</h4>
                <div class="prop-row"><label>ID:</label> <span id="prop-id"
                        style="color: #007acc; font-weight: bold;">None</span></div>
            </div>

            <div class="prop-group">
                <h4>Position</h4>
                <div class="prop-row"><label>X Position:</label> <input type="number" id="prop-x"
                        oninput="updateElementFromProps()"></div>
                <div class="prop-row"><label>Y Position:</label> <input type="number" id="prop-y"
                        oninput="updateElementFromProps()"></div>
            </div>

            <div class="prop-group">
                <h4>Dimensions</h4>
                <div class="prop-row"><label>Width:</label> <input type="number" id="prop-w"
                        oninput="updateElementFromProps()"></div>
                <div class="prop-row"><label>Height:</label> <input type="number" id="prop-h"
                        oninput="updateElementFromProps()"></div>
            </div>

            <div class="prop-group" id="prop-font-size-row">
                <h4>Typography</h4>
                <div class="prop-row"><label>Font Size:</label> <input type="number" id="prop-font-size"
                        oninput="updateElementFromProps()"></div>
            </div>

            <div class="hint">
                * Drag elements to move<br>
                * Use blue handle to scale<br>
                * Coordinates are relative to 1080x1920
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-container');
        let selectedElement = null;
        let isDragging = false;
        let isResizing = false;
        let startX, startY, startLeft, startTop, startWidth, startHeight;
        const SCALE = 0.4;

        // Initialize
        document.querySelectorAll('.element').forEach(el => {
            el.addEventListener('mousedown', onMouseDown);
        });

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);

        function onMouseDown(e) {
            if (e.target.classList.contains('resize-handle')) {
                isResizing = true;
                selectedElement = e.target.parentElement;
            } else {
                isDragging = true;
                selectedElement = e.currentTarget;
            }

            // Select visual
            document.querySelectorAll('.element').forEach(el => el.classList.remove('selected'));
            selectedElement.classList.add('selected');
            updatePropsDisplay();

            startX = e.clientX;
            startY = e.clientY;

            startLeft = parseInt(selectedElement.style.left || 0);
            startTop = parseInt(selectedElement.style.top || 0);
            startWidth = parseInt(selectedElement.style.width || 0);
            startHeight = parseInt(selectedElement.style.height || 0);

            e.stopPropagation();
            e.preventDefault();
        }

        function onMouseMove(e) {
            if (!selectedElement) return;

            const dx = (e.clientX - startX) / SCALE;
            const dy = (e.clientY - startY) / SCALE;

            if (isDragging) {
                selectedElement.style.left = Math.round(startLeft + dx) + 'px';
                selectedElement.style.top = Math.round(startTop + dy) + 'px';
            } else if (isResizing) {
                selectedElement.style.width = Math.max(50, Math.round(startWidth + dx)) + 'px';
                selectedElement.style.height = Math.max(50, Math.round(startHeight + dy)) + 'px';
            }

            updatePropsDisplay();
        }

        function onMouseUp() {
            isDragging = false;
            isResizing = false;
        }

        function updatePropsDisplay() {
            if (!selectedElement) return;
            document.getElementById('prop-id').innerText = selectedElement.id.toUpperCase();
            document.getElementById('prop-x').value = parseInt(selectedElement.style.left);
            document.getElementById('prop-y').value = parseInt(selectedElement.style.top);
            document.getElementById('prop-w').value = parseInt(selectedElement.style.width);
            document.getElementById('prop-h').value = parseInt(selectedElement.style.height);

            const fontSizeRow = document.getElementById('prop-font-size-row');
            if (selectedElement.id === 'difficulty_list') {
                fontSizeRow.style.display = 'block';
                document.getElementById('prop-font-size').value = selectedElement.getAttribute('data-font-size') || 50;
            } else {
                fontSizeRow.style.display = 'none';
            }
        }

        function updateElementFromProps() {
            if (!selectedElement) return;
            selectedElement.style.left = document.getElementById('prop-x').value + 'px';
            selectedElement.style.top = document.getElementById('prop-y').value + 'px';
            selectedElement.style.width = document.getElementById('prop-w').value + 'px';
            selectedElement.style.height = document.getElementById('prop-h').value + 'px';

            if (selectedElement.id === 'difficulty_list') {
                const fs = document.getElementById('prop-font-size').value;
                selectedElement.setAttribute('data-font-size', fs);
                selectedElement.querySelectorAll('.diff-item').forEach(item => {
                    item.style.fontSize = fs + 'px';
                });
            }
        }

        function downloadConfig() {
            const config = {};
            document.querySelectorAll('.element').forEach(el => {
                config[el.id] = {
                    x: parseInt(el.style.left),
                    y: parseInt(el.style.top),
                    width: parseInt(el.style.width),
                    height: parseInt(el.style.height)
                };
                if (el.id === 'difficulty_list') {
                    config[el.id].font_size = parseInt(el.getAttribute('data-font-size') || 50);
                }
            });

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(config, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "layout_config.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function resetLayout() {
            if (confirm("Reset all positions to defaults?")) {
                location.reload();
            }
        }
    </script>
</body>

</html>
